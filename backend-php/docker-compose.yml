services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: 3pl-backend-app
    container_name: 3pl-backend-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - 3pl-network

  web:
    image: nginx:alpine
    container_name: 3pl-backend-web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - 3pl-network
    depends_on:
      - app

networks:
  3pl-network:
    driver: bridge
